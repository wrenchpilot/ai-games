<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gorillas - Retro Style</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="back-home">
        <a href="../index.html">← Back to Home</a>
    </div>
    <div class="game-container">
        <header class="game-header">
            <h1>GORILLAS</h1>
            <div class="score-board">
                <div class="player-score">
                    <span>Player 1: <span id="score1">0</span></span>
                </div>
                <div class="player-score">
                    <span>Player 2: <span id="score2">0</span></span>
                </div>
            </div>
        </header>
        
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div class="game-controls">
            <div class="control-panel" id="controlPanel">
                <div class="player-turn" id="playerTurn">Player 1's Turn</div>
                <div class="input-group">
                    <label for="angle">Angle (0-90°):</label>
                    <input type="number" id="angle" min="0" max="90" value="45">
                </div>
                <div class="input-group">
                    <label for="velocity">Velocity (1-100):</label>
                    <input type="number" id="velocity" min="1" max="100" value="50">
                </div>
                <button id="fireButton" class="fire-btn">FIRE!</button>
            </div>
            <div class="game-status" id="gameStatus"></div>
        </div>
        
        <div class="instructions">
            <p>Destroy your opponent by throwing bananas! Adjust angle and velocity, then fire!</p>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
